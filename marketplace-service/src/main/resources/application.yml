server:
  port: 9011

spring:
  application:
    name: marketplace-service
  config:
    import: optional:configserver:http://localhost:9001
  data:
    mongodb:
      host: 68.183.244.52
      port: 27017
      database: nearly_marketplace
      username: seller_app
      password: StrongPassword123!
