server:
  port: 9004

spring:
  application:
    name: user-service
  config:
    import: optional:configserver:http://localhost:9001
  data:
    mongodb:
      host: 68.183.244.52
      port: 27017
      database: nearly_users
      username: seller_app
      password: StrongPassword123!
      authentication-database: admin
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  boot:
    admin:
      client:
        url: http://localhost:9090
        instance:
          prefer-ip: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:9000/eureka/
  instance:
    prefer-ip-address: true

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  file:
    name: logs/user-service.log
