server:
  port: 9020

spring:
  application:
    name: pai-service
  main:
    allow-bean-definition-overriding: true
  config:
    import: optional:configserver:http://localhost:9001
  data:
    mongodb:
      uri: mongodb://localhost:27017/nearly_pai
      auto-index-creation: true
    redis:
      host: localhost
      port: 6379

pai:
  matching:
    timeout-seconds: 30
    max-queue-time-seconds: 120
  queue:
    text-key: pai:queue:text
    video-key: pai:queue:video

eureka:
  client:
    service-url:
      defaultZone: http://localhost:9000/eureka/
  instance:
    prefer-ip-address: true

logging:
  file:
    name: logs/pai-service.log
