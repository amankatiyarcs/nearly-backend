server:
  port: 9015

spring:
  application:
    name: random-chat-service
  main:
    allow-bean-definition-overriding: true
  config:
    import: optional:configserver:http://localhost:9001
  data:
    mongodb:
      uri: mongodb://localhost:27017/nearly_chat
      auto-index-creation: true
    redis:
      host: localhost
      port: 6379

random-chat:
  matching:
    timeout-seconds: 30
  session:
    max-duration-minutes: 60
  queue:
    key: random-chat:waiting-queue

eureka:
  client:
    service-url:
      defaultZone: http://localhost:9000/eureka/
  instance:
    prefer-ip-address: true

logging:
  file:
    name: logs/random-chat-service.log
