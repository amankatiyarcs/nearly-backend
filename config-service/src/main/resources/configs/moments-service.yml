server:
  port: 9010

spring:
  application:
    name: moments-service
  data:
    mongodb:
      host: 68.183.244.52
      port: 27017
      database: nearly_events
      username: event_manager
      password: ChooseASecurePassword123!
      authentication-database: nearly_events
  kafka:
    bootstrap-servers: localhost:9092
